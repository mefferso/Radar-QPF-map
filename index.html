<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radar / MRMS Precip Accumulation</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body, #map {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    .title-box {
      position: absolute;
      top: 12px;
      left: 50px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.94);
      padding: 10px 14px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      max-width: 390px;
    }

    .title-box h1 {
      margin: 0 0 4px 0;
      font-size: 18px;
    }

    .title-box div {
      font-size: 12px;
      color: #333;
      line-height: 1.35;
    }

    .control-box {
      background: rgba(255, 255, 255, 0.95);
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      width: 285px;
    }

    .control-box h2 {
      font-size: 15px;
      margin: 0 0 8px 0;
    }

    .control-box label {
      display: block;
      margin: 7px 0;
      font-size: 14px;
      cursor: pointer;
    }

    .control-box select,
    .control-box input[type="range"] {
      width: 100%;
      margin-top: 4px;
    }

    .control-row {
      margin-top: 10px;
    }

    .control-note {
      margin-top: 9px;
      font-size: 11px;
      color: #444;
      line-height: 1.35;
    }

    .status-good { color: #1f6b2a; font-weight: bold; }
    .status-warn { color: #a25a00; font-weight: bold; }
    .status-bad { color: #b00020; font-weight: bold; }

    button {
      cursor: pointer;
      border: 1px solid #888;
      background: #f7f7f7;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 12px;
    }

    button:hover {
      background: #ececec;
    }

    .legend {
      background: rgba(255, 255, 255, 0.95);
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      font-size: 12px;
      line-height: 1.25;
    }

    .legend-title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .legend-gradient {
      width: 220px;
      height: 12px;
      background: linear-gradient(to right,
        #ffffff,
        #d6f5ff,
        #78c6ff,
        #1e72ff,
        #25bd35,
        #ffff00,
        #ff9d00,
        #ff0000,
        #b000b0,
        #ffffff
      );
      border: 1px solid #555;
      margin-bottom: 4px;
    }

    .legend-scale {
      display: flex;
      justify-content: space-between;
      width: 220px;
      font-size: 11px;
    }

    .leaflet-control-attribution {
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="title-box">
    <h1>Radar / MRMS Precip Accumulation</h1>
    <div>
      KHDC and KMOB use single-site radar precipitation image overlays. MRMS is kept separate so it does not accidentally show reflectivity pretending to be rainfall.
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map('map', {
      center: [30.45, -89.55],
      zoom: 8,
      preferCanvas: true
    });

    const baseLayers = {
      "OpenStreetMap": L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }),
      "Esri World Imagery": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 19,
        attribution: 'Tiles &copy; Esri'
      }),
      "Carto Light": L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
      })
    };

    baseLayers["OpenStreetMap"].addTo(map);

    const radarSites = {
      KHDC: {
        label: "KHDC - Hammond, LA",
        lat: 30.5195,
        lon: -90.4179
      },
      KMOB: {
        label: "KMOB - Mobile, AL",
        lat: 30.6794,
        lon: -88.2397
      }
    };

    const radarProducts = {
      NTP: {
        label: "Storm Total Precip",
        fallback: "DTA"
      },
      N1P: {
        label: "1 Hour Precip",
        fallback: null
      }
    };

    const mrmsProducts = {
      stp: {
        label: "MRMS precip accumulation",
        url: "https://mapservices.weather.noaa.gov/raster/services/obs/mrms_qpe/MapServer/WMSServer",
        layers: "0"
      }
    };

    let activeSource = "KHDC";
    let activeProduct = "NTP";
    let opacity = 0.72;
    let activeOverlay = null;
    let activeRangeRing = null;

    function bustCache(url) {
      const sep = url.includes('?') ? '&' : '?';
      return `${url}${sep}_=${Date.now()}`;
    }

    function boundsFromRadar(lat, lon, rangeKm) {
      const latDelta = rangeKm / 111.32;
      const lonDelta = rangeKm / (111.32 * Math.cos(lat * Math.PI / 180));
      return [[lat - latDelta, lon - lonDelta], [lat + latDelta, lon + lonDelta]];
    }

    function radarImageUrl(site, product) {
      return bustCache(`https://radar.weather.gov/ridge/RadarImg/${product}/${site}_${product}_0.gif`);
    }

    function setStatus(html) {
      const el = document.getElementById('layer-status');
      if (el) el.innerHTML = html;
    }

    function clearActiveOverlay() {
      if (activeOverlay && map.hasLayer(activeOverlay)) {
        map.removeLayer(activeOverlay);
      }
      if (activeRangeRing && map.hasLayer(activeRangeRing)) {
        map.removeLayer(activeRangeRing);
      }
      activeOverlay = null;
      activeRangeRing = null;
    }

    function showRadar(siteId) {
      clearActiveOverlay();

      const site = radarSites[siteId];
      const product = radarProducts[activeProduct];
      const rangeKm = 230;
      const bounds = boundsFromRadar(site.lat, site.lon, rangeKm);
      const primaryUrl = radarImageUrl(siteId, activeProduct);

      activeOverlay = L.imageOverlay(primaryUrl, bounds, {
        opacity,
        interactive: false,
        crossOrigin: false,
        attribution: 'NWS radar image overlay'
      }).addTo(map);

      activeOverlay.on('load', () => {
        setStatus(`<span class="status-good">Loaded:</span> ${siteId} ${product.label} (${activeProduct})`);
      });

      activeOverlay.on('error', () => {
        if (product.fallback) {
          const fallbackProduct = product.fallback;
          activeOverlay.setUrl(radarImageUrl(siteId, fallbackProduct));
          setStatus(`<span class="status-warn">Primary product failed:</span> tried ${activeProduct}; falling back to ${fallbackProduct}.`);
        } else {
          setStatus(`<span class="status-bad">Image failed:</span> ${siteId} ${activeProduct}. That product may not be available right now.`);
        }
      });

      activeRangeRing = L.circle([site.lat, site.lon], {
        radius: rangeKm * 1000,
        weight: 1,
        fill: false,
        opacity: 0.35
      }).addTo(map);

      setStatus(`<span class="status-warn">Loading:</span> ${siteId} ${product.label} (${activeProduct})`);
    }

    function showMrms() {
      clearActiveOverlay();

      const cfg = mrmsProducts.stp;
      activeOverlay = L.tileLayer.wms(cfg.url, {
        layers: cfg.layers,
        format: 'image/png',
        transparent: true,
        opacity,
        version: '1.3.0',
        attribution: 'NOAA / NWS MRMS QPE'
      }).addTo(map);

      activeOverlay.on('tileload', () => {
        setStatus(`<span class="status-good">Loaded:</span> MRMS QPE service`);
      });

      activeOverlay.on('tileerror', () => {
        setStatus(`<span class="status-bad">MRMS tile failed:</span> endpoint/layer may need adjustment. At least it is not fake reflectivity now.`);
      });

      setStatus(`<span class="status-warn">Loading:</span> MRMS QPE WMS`);
    }

    function refreshLayer() {
      if (activeSource === "MRMS") {
        showMrms();
      } else {
        showRadar(activeSource);
      }
    }

    const ControlBox = L.Control.extend({
      options: { position: 'topright' },
      onAdd: function () {
        const div = L.DomUtil.create('div', 'control-box');
        div.innerHTML = `
          <h2>Precip Layer</h2>
          <label><input type="radio" name="precip-source" value="KHDC" checked> KHDC radar</label>
          <label><input type="radio" name="precip-source" value="KMOB"> KMOB radar</label>
          <label><input type="radio" name="precip-source" value="MRMS"> MRMS</label>

          <div class="control-row">
            <label>
              Radar product
              <select id="product-select">
                <option value="NTP" selected>Storm Total Precip</option>
                <option value="N1P">1 Hour Precip</option>
              </select>
            </label>
          </div>

          <div class="control-row">
            <label>
              Opacity
              <input id="opacity-slider" type="range" min="0" max="1" step="0.05" value="0.72">
            </label>
          </div>

          <div class="control-row">
            <button id="refresh-button" type="button">Refresh layer</button>
          </div>

          <div id="layer-status" class="control-note"></div>
          <div class="control-note">
            Note: radar precip images are single-site products. MRMS is a separate gridded QPE service and may need the exact NOAA layer ID tuned if the public service changes.
          </div>
        `;
        L.DomEvent.disableClickPropagation(div);
        L.DomEvent.disableScrollPropagation(div);
        return div;
      }
    });

    map.addControl(new ControlBox());

    document.querySelectorAll('input[name="precip-source"]').forEach(input => {
      input.addEventListener('change', event => {
        activeSource = event.target.value;
        refreshLayer();
      });
    });

    document.getElementById('product-select').addEventListener('change', event => {
      activeProduct = event.target.value;
      refreshLayer();
    });

    document.getElementById('opacity-slider').addEventListener('input', event => {
      opacity = Number(event.target.value);
      if (activeOverlay && activeOverlay.setOpacity) {
        activeOverlay.setOpacity(opacity);
      }
    });

    document.getElementById('refresh-button').addEventListener('click', refreshLayer);

    L.control.layers(baseLayers, null, { collapsed: true }).addTo(map);

    const siteMarkers = L.layerGroup([
      L.marker([radarSites.KHDC.lat, radarSites.KHDC.lon]).bindPopup('<b>KHDC</b><br>Hammond, LA radar'),
      L.marker([radarSites.KMOB.lat, radarSites.KMOB.lon]).bindPopup('<b>KMOB</b><br>Mobile, AL radar')
    ]).addTo(map);

    L.control.layers(null, {
      "Radar sites": siteMarkers
    }, { collapsed: true }).addTo(map);

    const Legend = L.Control.extend({
      options: { position: 'bottomright' },
      onAdd: function () {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = `
          <div class="legend-title">Precip Accumulation</div>
          <div class="legend-gradient"></div>
          <div class="legend-scale"><span>Lower</span><span>Higher</span></div>
          <div style="margin-top:6px;">Approximate; source legend depends on selected product.</div>
        `;
        return div;
      }
    });

    map.addControl(new Legend());
    showRadar(activeSource);
  </script>
</body>
</html>
