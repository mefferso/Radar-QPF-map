<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radar / MRMS Precip Accumulation</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body, #map {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    .title-box {
      position: absolute;
      top: 12px;
      left: 50px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.94);
      padding: 10px 14px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      max-width: 430px;
    }

    .title-box h1 {
      margin: 0 0 4px 0;
      font-size: 18px;
    }

    .title-box div {
      font-size: 12px;
      color: #333;
      line-height: 1.35;
    }

    .control-box {
      background: rgba(255, 255, 255, 0.95);
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      width: 305px;
    }

    .control-box h2 {
      font-size: 15px;
      margin: 0 0 8px 0;
    }

    .control-box label {
      display: block;
      margin: 7px 0;
      font-size: 14px;
      cursor: pointer;
    }

    .control-box select,
    .control-box input[type="range"] {
      width: 100%;
      margin-top: 4px;
    }

    .control-row { margin-top: 10px; }

    .control-note {
      margin-top: 9px;
      font-size: 11px;
      color: #444;
      line-height: 1.35;
      word-break: break-word;
    }

    .status-good { color: #1f6b2a; font-weight: bold; }
    .status-warn { color: #a25a00; font-weight: bold; }
    .status-bad { color: #b00020; font-weight: bold; }

    button {
      cursor: pointer;
      border: 1px solid #888;
      background: #f7f7f7;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 12px;
    }

    button:hover { background: #ececec; }

    .legend {
      background: rgba(255, 255, 255, 0.95);
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      font-size: 12px;
      line-height: 1.25;
    }

    .legend-title { font-weight: bold; margin-bottom: 6px; }

    .legend-gradient {
      width: 220px;
      height: 12px;
      background: linear-gradient(to right,
        #ffffff,
        #d6f5ff,
        #78c6ff,
        #1e72ff,
        #25bd35,
        #ffff00,
        #ff9d00,
        #ff0000,
        #b000b0,
        #ffffff
      );
      border: 1px solid #555;
      margin-bottom: 4px;
    }

    .legend-scale {
      display: flex;
      justify-content: space-between;
      width: 220px;
      font-size: 11px;
    }

    .leaflet-control-attribution { font-size: 10px; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="title-box">
    <h1>Radar / MRMS Precip Accumulation</h1>
    <div>
      KHDC/KMOB now try dual-pol precip products first: DTA for storm-total and DAA for 1-hour. Legacy NTP/N1P are only fallbacks.
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map('map', {
      center: [30.45, -89.55],
      zoom: 8,
      preferCanvas: true
    });

    const baseLayers = {
      "OpenStreetMap": L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }),
      "Esri World Imagery": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 19,
        attribution: 'Tiles &copy; Esri'
      }),
      "Carto Light": L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
      })
    };

    baseLayers["OpenStreetMap"].addTo(map);

    const radarSites = {
      KHDC: { label: "KHDC - Hammond, LA", lat: 30.5195, lon: -90.4179 },
      KMOB: { label: "KMOB - Mobile, AL", lat: 30.6794, lon: -88.2397 }
    };

    const radarProducts = {
      DTA: { label: "Storm Total Precip", legacy: "NTP" },
      DAA: { label: "1 Hour Precip", legacy: "N1P" }
    };

    const mrmsProducts = {
      qpe: {
        label: "MRMS QPE",
        url: "https://mapservices.weather.noaa.gov/raster/services/obs/mrms_qpe/MapServer/WMSServer",
        layers: "0"
      }
    };

    let activeSource = "KHDC";
    let activeProduct = "DTA";
    let opacity = 0.72;
    let activeOverlay = null;
    let activeRangeRing = null;
    let activeLoadedUrl = null;

    function bustCache(url) {
      const sep = url.includes('?') ? '&' : '?';
      return `${url}${sep}_=${Date.now()}`;
    }

    function boundsFromRadar(lat, lon, rangeKm) {
      const latDelta = rangeKm / 111.32;
      const lonDelta = rangeKm / (111.32 * Math.cos(lat * Math.PI / 180));
      return [[lat - latDelta, lon - lonDelta], [lat + latDelta, lon + lonDelta]];
    }

    function setStatus(html) {
      const el = document.getElementById('layer-status');
      if (el) el.innerHTML = html;
    }

    function setOpenLink(url) {
      const el = document.getElementById('open-image-link');
      if (!el) return;

      if (!url) {
        el.innerHTML = '';
        return;
      }

      const cleanUrl = url.replace(/([?&])_=\d+$/, '');
      el.innerHTML = `<a href="${cleanUrl}" target="_blank" rel="noopener">Open raw product image</a>`;
    }

    function clearActiveOverlay() {
      if (activeOverlay && map.hasLayer(activeOverlay)) map.removeLayer(activeOverlay);
      if (activeRangeRing && map.hasLayer(activeRangeRing)) map.removeLayer(activeRangeRing);
      activeOverlay = null;
      activeRangeRing = null;
      activeLoadedUrl = null;
      setOpenLink(null);
    }

    function candidateRadarUrls(siteId, productCode) {
      const product = radarProducts[productCode];
      const codes = [productCode];
      if (product && product.legacy) codes.push(product.legacy);

      const urls = [];
      codes.forEach(code => {
        urls.push(`https://radar.weather.gov/ridge/RadarImg/${code}/${siteId}_${code}_0.gif`);
        urls.push(`https://radar.weather.gov/ridge/standard/${siteId}_${code}_0.gif`);
      });
      return urls;
    }

    function loadFirstWorkingImage(urls, callback, failedUrls = []) {
      if (!urls.length) {
        callback(null, failedUrls);
        return;
      }

      const rawUrl = urls[0];
      const testUrl = bustCache(rawUrl);
      const img = new Image();

      img.onload = () => {
        if (img.naturalWidth > 10 && img.naturalHeight > 10) {
          callback(testUrl, failedUrls);
        } else {
          loadFirstWorkingImage(urls.slice(1), callback, failedUrls.concat(rawUrl));
        }
      };

      img.onerror = () => {
        loadFirstWorkingImage(urls.slice(1), callback, failedUrls.concat(rawUrl));
      };

      img.src = testUrl;
    }

    function showRadar(siteId) {
      clearActiveOverlay();

      const site = radarSites[siteId];
      const product = radarProducts[activeProduct];
      const rangeKm = 230;
      const bounds = boundsFromRadar(site.lat, site.lon, rangeKm);
      const urls = candidateRadarUrls(siteId, activeProduct);

      setStatus(`<span class="status-warn">Trying:</span> ${siteId} ${product.label} (${activeProduct}); fallback ${product.legacy}`);

      loadFirstWorkingImage(urls, (workingUrl, failedUrls) => {
        if (!workingUrl) {
          setStatus(
            `<span class="status-bad">No radar precip image loaded.</span><br>` +
            `Tried ${siteId} ${activeProduct}` + (product.legacy ? ` and ${product.legacy}` : '') + `.<br>` +
            `This can happen when the radar precip product is unavailable/expired, or if radar.weather.gov is not exposing that product. Tried:<br>` +
            failedUrls.map(u => `• ${u}`).join('<br>')
          );
          return;
        }

        activeLoadedUrl = workingUrl;
        activeOverlay = L.imageOverlay(workingUrl, bounds, {
          opacity,
          interactive: false,
          attribution: 'NWS radar product image'
        }).addTo(map);

        activeRangeRing = L.circle([site.lat, site.lon], {
          radius: rangeKm * 1000,
          weight: 1,
          fill: false,
          opacity: 0.35
        }).addTo(map);

        const productCodeLoaded = workingUrl.match(/_([A-Z0-9]{3})_0\.gif/)?.[1] || activeProduct;
        const usedFallback = productCodeLoaded !== activeProduct;

        setStatus(
          `<span class="status-good">Loaded:</span> ${siteId} ${productCodeLoaded}` +
          (usedFallback ? ` <span class="status-warn">fallback</span>` : '') +
          `<br>${radarProducts[activeProduct].label}`
        );
        setOpenLink(workingUrl);
      });
    }

    function showMrms() {
      clearActiveOverlay();

      const cfg = mrmsProducts.qpe;
      activeOverlay = L.tileLayer.wms(cfg.url, {
        layers: cfg.layers,
        format: 'image/png',
        transparent: true,
        opacity,
        version: '1.3.0',
        attribution: 'NOAA / NWS MRMS QPE'
      }).addTo(map);

      activeOverlay.on('tileload', () => {
        setStatus(`<span class="status-good">Loaded:</span> MRMS QPE WMS layer ${cfg.layers}`);
      });

      activeOverlay.on('tileerror', () => {
        setStatus(`<span class="status-bad">MRMS tile failed:</span> MRMS endpoint/layer ID likely needs tuning.`);
      });

      setStatus(`<span class="status-warn">Loading:</span> MRMS QPE WMS`);
    }

    function refreshLayer() {
      if (activeSource === "MRMS") showMrms();
      else showRadar(activeSource);
    }

    const ControlBox = L.Control.extend({
      options: { position: 'topright' },
      onAdd: function () {
        const div = L.DomUtil.create('div', 'control-box');
        div.innerHTML = `
          <h2>Precip Layer</h2>
          <label><input type="radio" name="precip-source" value="KHDC" checked> KHDC radar</label>
          <label><input type="radio" name="precip-source" value="KMOB"> KMOB radar</label>
          <label><input type="radio" name="precip-source" value="MRMS"> MRMS</label>

          <div class="control-row" id="radar-product-row">
            <label>
              Radar product
              <select id="product-select">
                <option value="DTA" selected>Storm Total Precip - DTA</option>
                <option value="DAA">1 Hour Precip - DAA</option>
              </select>
            </label>
          </div>

          <div class="control-row">
            <label>
              Opacity
              <input id="opacity-slider" type="range" min="0" max="1" step="0.05" value="0.72">
            </label>
          </div>

          <div class="control-row">
            <button id="refresh-button" type="button">Refresh layer</button>
          </div>

          <div id="layer-status" class="control-note"></div>
          <div id="open-image-link" class="control-note"></div>
          <div class="control-note">
            Radar precip is single-site image data. If DTA/DAA are not available, the app tries legacy NTP/N1P. MRMS is separate gridded QPE.
          </div>
        `;
        L.DomEvent.disableClickPropagation(div);
        L.DomEvent.disableScrollPropagation(div);
        return div;
      }
    });

    map.addControl(new ControlBox());

    function updateRadarProductVisibility() {
      const row = document.getElementById('radar-product-row');
      if (row) row.style.display = activeSource === 'MRMS' ? 'none' : 'block';
    }

    document.querySelectorAll('input[name="precip-source"]').forEach(input => {
      input.addEventListener('change', event => {
        activeSource = event.target.value;
        updateRadarProductVisibility();
        refreshLayer();
      });
    });

    document.getElementById('product-select').addEventListener('change', event => {
      activeProduct = event.target.value;
      refreshLayer();
    });

    document.getElementById('opacity-slider').addEventListener('input', event => {
      opacity = Number(event.target.value);
      if (activeOverlay && activeOverlay.setOpacity) activeOverlay.setOpacity(opacity);
    });

    document.getElementById('refresh-button').addEventListener('click', refreshLayer);

    L.control.layers(baseLayers, null, { collapsed: true }).addTo(map);

    const siteMarkers = L.layerGroup([
      L.marker([radarSites.KHDC.lat, radarSites.KHDC.lon]).bindPopup('<b>KHDC</b><br>Hammond, LA radar'),
      L.marker([radarSites.KMOB.lat, radarSites.KMOB.lon]).bindPopup('<b>KMOB</b><br>Mobile, AL radar')
    ]).addTo(map);

    L.control.layers(null, { "Radar sites": siteMarkers }, { collapsed: true }).addTo(map);

    const Legend = L.Control.extend({
      options: { position: 'bottomright' },
      onAdd: function () {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = `
          <div class="legend-title">Precip Accumulation</div>
          <div class="legend-gradient"></div>
          <div class="legend-scale"><span>Lower</span><span>Higher</span></div>
          <div style="margin-top:6px;">Approximate; source legend depends on selected product.</div>
        `;
        return div;
      }
    });

    map.addControl(new Legend());
    updateRadarProductVisibility();
    showRadar(activeSource);
  </script>
</body>
</html>
