<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Radar / MRMS Precip Accumulation</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
html,body,#map{height:100%;width:100%;margin:0;font-family:Arial,Helvetica,sans-serif}.leaflet-container{background:#f7f7f7}.panel,.readout,.legend{background:rgba(255,255,255,.96);border:1px solid rgba(0,0,0,.25);border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.25);color:#111}.panel{width:235px;padding:9px 10px;font-size:12px}.leaflet-top.leaflet-left .panel{margin-top:8px}.panel h1{margin:0 0 7px;font-size:15px}.panel label{display:block;margin:5px 0}.panel .section{margin-top:8px;padding-top:8px;border-top:1px solid #ddd}.panel select,.panel input[type=range]{width:100%;box-sizing:border-box}.panel button{margin-top:6px;padding:4px 8px;border:1px solid #777;border-radius:4px;background:#f6f6f6;cursor:pointer;font-size:12px}.status{margin-top:7px;font-size:10px;line-height:1.25}.good{color:#08751f;font-weight:700}.bad{color:#b00020;font-weight:700}.readout{padding:10px 12px;min-width:260px;font-size:13px}.readout .value{display:inline-block;font-size:25px;font-weight:900;margin:3px 0;padding:2px 8px;border-radius:5px;border:1px solid rgba(0,0,0,.25)}.readout .coords,.readout .meta{font-size:11px;color:#333}.legend{padding:10px 12px;width:620px;max-width:calc(100vw - 36px);font-size:12px}.legend-title{font-weight:900;font-size:13px;margin-bottom:7px}.legend-scale{display:grid;grid-template-columns:repeat(8,1fr);gap:3px}.legend-cell{border:1px solid #333;padding:5px 3px;text-align:center;font-size:11px;font-weight:900;line-height:1.1}.legend-note{margin-top:7px;font-size:11px;color:#333}.city-label{pointer-events:none}.city-text{color:#111;font-size:18px;font-weight:900;white-space:nowrap;text-shadow:-2px -2px 0 #fff,2px -2px 0 #fff,-2px 2px 0 #fff,2px 2px 0 #fff,0 0 6px #fff}.city-dot{display:inline-block;width:7px;height:7px;background:white;border:2px solid #000;border-radius:50%;margin-right:5px;vertical-align:middle}@media(max-width:800px){.legend{width:92vw}.legend-scale{grid-template-columns:repeat(4,1fr)}.panel{width:225px}.city-text{font-size:14px}}
</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map=L.map('map',{center:[30.35,-89.80],zoom:8,preferCanvas:true});
['weatherPane','referencePane','cityPane'].forEach((p,i)=>{map.createPane(p);map.getPane(p).style.zIndex=[450,700,760][i];map.getPane(p).style.pointerEvents='none'});
const LOCAL={west:-92.5,east:-88,south:28.5,north:32};
const URLS={county:'https://raw.githubusercontent.com/plotly/datasets/master/geojson-counties-fips.json',lakes:'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_10m_lakes.geojson',states:'https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json',nws:'https://mapservices.weather.noaa.gov/static/rest/services/nws_reference_maps/nws_reference_map/MapServer',mrms:'https://mapservices.weather.noaa.gov/raster/rest/services/obs/mrms_qpe/MapServer'};
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'Base &copy; Esri'}).addTo(map);
const RADARS={KHDC:{station:'khdc'},KMOB:{station:'kmob'}};
const PRODUCTS={DTA:{label:'Storm Total Precip',code:'bdsa'},DAA:{label:'1 Hour Precip',code:'boha'}};
const RAIN=[{v:.10,l:'0.10',c:'#76e9ff',t:'#000'},{v:.25,l:'0.25',c:'#00a0f0',t:'#000'},{v:.50,l:'0.50',c:'#0000f0',t:'#fff'},{v:.75,l:'0.75',c:'#00e000',t:'#000'},{v:1.00,l:'1.00',c:'#00a000',t:'#fff'},{v:1.50,l:'1.50',c:'#b0e000',t:'#000'},{v:2.00,l:'2.00',c:'#ffff00',t:'#000'},{v:2.50,l:'2.50',c:'#e0a000',t:'#000'},{v:3.00,l:'3.00',c:'#ff0000',t:'#fff'},{v:4.00,l:'4.00',c:'#af0000',t:'#fff'},{v:5.00,l:'5.00',c:'#ff00ff',t:'#fff'},{v:6.00,l:'6.00',c:'#af00af',t:'#fff'},{v:8.00,l:'8.00',c:'#ffd8d8',t:'#000'},{v:10.00,l:'10.00',c:'#ffa0a0',t:'#000'},{v:12.00,l:'12.00',c:'#ffffff',t:'#000'},{v:15.00,l:'15.00+',c:'#b0b0b0',t:'#000'}];
const CITIES=[['Baton Rouge',30.4515,-91.1871],['New Orleans',29.9511,-90.0715],['Gulfport',30.3674,-89.0928],['McComb',31.2438,-90.4532],['Woodville',31.1046,-91.2993],['Hammond',30.5044,-90.4612],['Bogalusa',30.7910,-89.8487],['Houma',29.5958,-90.7195],['Covington',30.4755,-90.1009],['Mandeville',30.3583,-90.0656],['Slidell',30.2752,-89.7812],['Picayune',30.5255,-89.6795],['Poplarville',30.8402,-89.5342],['Franklinton',30.8471,-90.1531],['Amite',30.7266,-90.5087],['Greensburg',30.8307,-90.6718],['Gonzales',30.2385,-90.9201],['Laplace',30.0666,-90.4801],['Thibodaux',29.7958,-90.8229],['Galliano',29.4422,-90.2992],['Bay St. Louis',30.3088,-89.3300],['Waveland',30.2869,-89.3762],['Diamondhead',30.3946,-89.3639],['Biloxi',30.3960,-88.8853],['Ocean Springs',30.4113,-88.8278],['Pascagoula',30.3658,-88.5561]];
let state={source:'KHDC',product:'DTA',opacity:.72,wx:null,county:null,states:null,lakes:null,cwa:null,cities:null,pinned:false,pin:null,last:0,seq:0};
function station(){return RADARS[state.source].station}function layer(){return `${station()}_${PRODUCTS[state.product].code}`}function wms(){return `https://opengeo.ncep.noaa.gov/geoserver/${station()}/ows`}function status(x){document.getElementById('status').innerHTML=x}
function colorBin(v){if(v==null||Number.isNaN(Number(v))||Number(v)<.10)return null;let b=RAIN[0];for(const r of RAIN){if(Number(v)>=r.v)b=r}return b}function fmt(v){const b=colorBin(v);if(!b)return{txt:'No data',bg:'transparent',fg:'#555'};return{txt:`${Number(v).toFixed(2)} in`,bg:b.c,fg:b.t}}
function read(ll,val,meta,bg='transparent',fg='#555'){const e=document.getElementById('readout-value');e.innerHTML=val;e.style.background=bg;e.style.color=fg;document.getElementById('readout-coords').textContent=`${ll.lat.toFixed(4)}°, ${ll.lng.toFixed(4)}°`;document.getElementById('readout-meta').textContent=meta}
function loadWx(){if(state.wx)map.removeLayer(state.wx);if(state.source==='MRMS'){state.wx=new ArcLayer({opacity:state.opacity,tileSize:256,pane:'weatherPane'}).addTo(map);status('<span class="good">Layer:</span> MRMS QPE')}else{state.wx=L.tileLayer.wms(wms(),{layers:layer(),format:'image/png',transparent:true,version:'1.1.1',opacity:state.opacity,pane:'weatherPane',crossOrigin:'anonymous'}).addTo(map);status(`<span class="good">Layer:</span> ${layer()}`)}front();legend();if(!state.pinned)read(map.getCenter(),'Move cursor','Cursor samples the active layer. Click map to pin.')}
const ArcLayer=L.GridLayer.extend({createTile:function(c,done){const t=document.createElement('img');t.crossOrigin='anonymous';t.onload=()=>done(null,t);t.onerror=()=>done(Error('MRMS tile failed'),t);t.style.width=t.style.height='256px';const nw=c.multiplyBy(256),se=nw.add([256,256]),nwp=map.unproject(nw,c.z),sep=map.unproject(se,c.z),sw=map.options.crs.project(L.latLng(sep.lat,nwp.lng)),ne=map.options.crs.project(L.latLng(nwp.lat,sep.lng));t.src=`${URLS.mrms}/export?f=image&bbox=${[sw.x,sw.y,ne.x,ne.y].join(',')}&bboxSR=3857&imageSR=3857&size=256,256&format=png32&transparent=true&layers=show:0&_=${Date.now()}`;return t}});
function legend(){const title=document.getElementById('legend-title'),body=document.getElementById('legend-body');title.textContent=state.source==='MRMS'?`MRMS QPE / ${PRODUCTS[state.product].label}`:`${state.source} ${PRODUCTS[state.product].label}`;body.innerHTML=`<div class="legend-scale">${RAIN.map(r=>`<div class="legend-cell" style="background:${r.c};color:${r.t}">${r.l}<br>in</div>`).join('')}</div><div class="legend-note">Technical value mapping table. Readout uses same rainfall threshold color bin.</div>`}
function identify(ll,seq){if(state.source==='MRMS'){const s=map.getSize(),b=map.getBounds(),ext=[b.getWest(),b.getSouth(),b.getEast(),b.getNorth()].join(','),geom=`${ll.lng},${ll.lat}`,u=`${URLS.mrms}/identify?f=json&geometry=${encodeURIComponent(geom)}&geometryType=esriGeometryPoint&sr=4326&layers=all:0&tolerance=3&mapExtent=${encodeURIComponent(ext)}&imageDisplay=${s.x},${s.y},96&returnGeometry=false`;fetch(u).then(r=>r.json()).then(j=>{if(seq!==state.seq)return;let v=extract(j?.results?.[0]?.attributes),f=fmt(v);read(ll,f.txt,'MRMS identify',f.bg,f.fg)}).catch(e=>read(ll,'Unavailable',`MRMS identify failed: ${e.message}`));return}const p=map.latLngToContainerPoint(ll),s=map.getSize(),b=map.getBounds(),bbox=[b.getWest(),b.getSouth(),b.getEast(),b.getNorth()].join(','),u=`${wms()}?service=WMS&version=1.1.1&request=GetFeatureInfo&layers=${encodeURIComponent(layer())}&query_layers=${encodeURIComponent(layer())}&styles=&bbox=${encodeURIComponent(bbox)}&width=${s.x}&height=${s.y}&x=${Math.round(p.x)}&y=${Math.round(p.y)}&srs=EPSG:4326&info_format=application/json`;fetch(u).then(r=>r.json()).then(j=>{if(seq!==state.seq)return;let v=extract(j?.features?.[0]?.properties),f=fmt(v);read(ll,f.txt,`${state.source} GetFeatureInfo`,f.bg,f.fg)}).catch(e=>read(ll,'Unavailable',`GetFeatureInfo failed: ${e.message}`))}
function extract(o){if(!o)return null;for(const k of ['GRAY_INDEX','gray_index','value','VALUE','pixel_value','PixelValue','band_1','Band1','RASTERVALU','grid_value']){if(o[k]!=null&&!Number.isNaN(Number(o[k])))return Number(o[k])}for(const v of Object.values(o)){if(!Number.isNaN(Number(v)))return Number(v)}return null}
function touches(f){let ok=false;function scan(c){if(ok)return;if(typeof c[0]==='number'){let lon=c[0],lat=c[1];if(lon>=LOCAL.west&&lon<=LOCAL.east&&lat>=LOCAL.south&&lat<=LOCAL.north)ok=true;return}c.forEach(scan)}if(f.geometry?.coordinates)scan(f.geometry.coordinates);return ok}
function county(){fetch(URLS.county).then(r=>r.json()).then(g=>{state.county=L.geoJSON({type:'FeatureCollection',features:g.features.filter(touches)},{interactive:false,pane:'referencePane',style:{color:'#b7b7b7',weight:.55,opacity:.65,fillOpacity:0}}).addTo(map);front()})}
function cwa(){const where=encodeURIComponent("wfo='LIX'");fetch(`${URLS.nws}/1/query?where=${where}&outFields=wfo,cwa&returnGeometry=true&outSR=4326&f=geojson`).then(r=>r.json()).then(g=>{state.cwa=L.geoJSON(g,{interactive:false,pane:'referencePane',style:{color:'#000',weight:3,opacity:.95,fillOpacity:0}}).addTo(map);front()}).catch(e=>status(`<span class="bad">Official LIX CWA failed:</span> ${e.message}`))}
function states(){fetch(URLS.states).then(r=>r.json()).then(g=>{state.states=L.geoJSON({type:'FeatureCollection',features:g.features.filter(f=>['Louisiana','Mississippi','Alabama'].includes(f.properties?.name))},{interactive:false,pane:'referencePane',style:{color:'#555',weight:1.4,opacity:.9,fillOpacity:0}}).addTo(map);front()})}
function lakes(){fetch(URLS.lakes).then(r=>r.json()).then(g=>{state.lakes=L.geoJSON({type:'FeatureCollection',features:g.features.filter(touches)},{interactive:false,pane:'referencePane',style:{color:'#000',weight:1.2,opacity:.85,fillOpacity:0}}).addTo(map);front()})}
function cities(){state.cities=L.layerGroup(CITIES.map(c=>L.marker([c[1],c[2]],{pane:'cityPane',interactive:false,icon:L.divIcon({className:'city-label',html:`<div class="city-text"><span class="city-dot"></span>${c[0]}</div>`,iconSize:[180,26],iconAnchor:[4,13]})}))).addTo(map);front()}
function front(){for(const k of ['county','states','lakes','cwa'])if(state[k])state[k].bringToFront();if(state.cities)state.cities.eachLayer(l=>l.setZIndexOffset(1000))}
const Controls=L.Control.extend({options:{position:'topleft'},onAdd:function(){const d=L.DomUtil.create('div','panel');d.innerHTML=`<h1>Precip Accumulation</h1><label><input type="radio" name="source" value="KHDC" checked> KHDC radar</label><label><input type="radio" name="source" value="KMOB"> KMOB radar</label><label><input type="radio" name="source" value="MRMS"> MRMS QPE</label><div class="section"><label>Product<select id="product-select"><option value="DTA" selected>Storm Total Precip</option><option value="DAA">1 Hour Precip</option></select></label></div><div class="section"><label>Opacity <span id="opacity-label">72%</span><input id="opacity" type="range" min="0" max="1" step=".05" value=".72"></label><button id="refresh" type="button">Refresh</button></div><div id="status" class="status"></div>`;L.DomEvent.disableClickPropagation(d);L.DomEvent.disableScrollPropagation(d);return d}});
const Readout=L.Control.extend({options:{position:'bottomleft'},onAdd:function(){const d=L.DomUtil.create('div','readout');d.innerHTML='<strong>Cursor Readout</strong><div id="readout-value" class="value">Move cursor</div><div id="readout-coords" class="coords">--</div><div id="readout-meta" class="meta">Click map to pin; click again to unpin.</div>';L.DomEvent.disableClickPropagation(d);return d}});
const Legend=L.Control.extend({options:{position:'bottomright'},onAdd:function(){const d=L.DomUtil.create('div','legend');d.innerHTML='<div id="legend-title" class="legend-title">Legend</div><div id="legend-body">Loading legend...</div>';L.DomEvent.disableClickPropagation(d);return d}});
map.addControl(new Controls());map.addControl(new Readout());map.addControl(new Legend());
document.querySelectorAll('input[name=source]').forEach(i=>i.addEventListener('change',e=>{state.source=e.target.value;state.pinned=false;if(state.pin)map.removeLayer(state.pin);state.pin=null;loadWx()}));
document.getElementById('product-select').addEventListener('change',e=>{state.product=e.target.value;state.pinned=false;if(state.pin)map.removeLayer(state.pin);state.pin=null;loadWx()});
document.getElementById('opacity').addEventListener('input',e=>{state.opacity=Number(e.target.value);document.getElementById('opacity-label').textContent=`${Math.round(state.opacity*100)}%`;if(state.wx?.setOpacity)state.wx.setOpacity(state.opacity)});
document.getElementById('refresh').addEventListener('click',loadWx);
map.on('mousemove',e=>{if(state.pinned)return;let now=Date.now();if(now-state.last<250)return;state.last=now;identify(e.latlng,++state.seq)});
map.on('click',e=>{if(state.pinned){state.pinned=false;if(state.pin)map.removeLayer(state.pin);state.pin=null;read(e.latlng,'Unpinned','Move cursor to sample.');return}state.pinned=true;if(state.pin)map.removeLayer(state.pin);state.pin=L.circleMarker(e.latlng,{radius:6,color:'#000',weight:2,fillColor:'#fff',fillOpacity:1,pane:'cityPane'}).addTo(map);identify(e.latlng,++state.seq)});
loadWx();county();cwa();states();lakes();cities();
</script>
</body>
</html>
