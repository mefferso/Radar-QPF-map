<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Radar / MRMS Precip Accumulation</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
html,body,#map{height:100%;width:100%;margin:0;font-family:Arial,Helvetica,sans-serif}.leaflet-container{background:#f7f7f7}.panel,.readout{background:rgba(255,255,255,.96);border:1px solid rgba(0,0,0,.25);border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.25);color:#111}.panel{width:235px;padding:9px 10px;font-size:12px}.leaflet-top.leaflet-left .panel{margin-top:8px}.panel h1{margin:0 0 7px;font-size:15px}.panel label{display:block;margin:5px 0}.panel .section{margin-top:8px;padding-top:8px;border-top:1px solid #ddd}.panel select,.panel input[type=range]{width:100%;box-sizing:border-box}.panel button{margin-top:6px;padding:4px 8px;border:1px solid #777;border-radius:4px;background:#f6f6f6;cursor:pointer;font-size:12px}.status{margin-top:7px;font-size:10px;line-height:1.25}.good{color:#08751f;font-weight:700}.bad{color:#b00020;font-weight:700}.readout{padding:10px 12px;min-width:260px;font-size:13px}.readout .value{display:inline-block;font-size:25px;font-weight:900;margin:3px 0;padding:2px 8px;border-radius:5px;border:1px solid rgba(0,0,0,.25)}.readout .coords,.readout .meta{font-size:11px;color:#333}.legend{background:#202020;border:1px solid #111;border-radius:2px;box-shadow:0 2px 10px rgba(0,0,0,.35);padding:6px 8px 7px;width:740px;max-width:calc(100vw - 36px);color:#fff;font-family:Arial,Helvetica,sans-serif}.legend-title{font-weight:800;font-size:13px;margin-bottom:4px;color:#fff}.radar-legend-bar{display:grid;height:16px;border:1px solid #0b0b0b}.radar-legend-swatch{display:block}.radar-legend-labels{display:grid;background:#222;color:#fff;font-size:8px;font-weight:800;line-height:1;margin-top:3px;min-height:23px}.radar-legend-labels span{text-align:center;white-space:nowrap}.radar-legend-labels span:nth-child(even){padding-top:11px}.legend-note{margin-top:5px;font-size:10px;color:#d8d8d8}.city-label{pointer-events:none}.city-text{color:#111;font-size:18px;font-weight:900;white-space:nowrap;text-shadow:-2px -2px 0 #fff,2px -2px 0 #fff,-2px 2px 0 #fff,2px 2px 0 #fff,0 0 6px #fff}.city-dot{display:inline-block;width:7px;height:7px;background:white;border:2px solid #000;border-radius:50%;margin-right:5px;vertical-align:middle}@media(max-width:800px){.legend{width:92vw}.radar-legend-labels{font-size:7px}.panel{width:225px}.city-text{font-size:14px}}
</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map=L.map('map',{center:[30.35,-89.80],zoom:8,preferCanvas:true});
['weatherPane','referencePane','cityPane'].forEach((p,i)=>{map.createPane(p);map.getPane(p).style.zIndex=[450,700,760][i];map.getPane(p).style.pointerEvents='none'});
const LOCAL={west:-92.5,east:-88,south:28.5,north:32};
const URLS={county:'https://raw.githubusercontent.com/plotly/datasets/master/geojson-counties-fips.json',lakes:'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_10m_lakes.geojson',states:'https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json',nws:'https://mapservices.weather.noaa.gov/static/rest/services/nws_reference_maps/nws_reference_map/MapServer',mrms:'https://mapservices.weather.noaa.gov/raster/rest/services/obs/mrms_qpe/MapServer'};
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'Base &copy; Esri'}).addTo(map);
const RADARS={KHDC:{station:'khdc'},KMOB:{station:'kmob'}};
const PRODUCTS={DTA:{label:'Storm Total Precip',code:'bdsa'},DAA:{label:'1 Hour Precip',code:'boha'}};
const RAIN=[{v:.10,l:'0.10',c:'#1A1A1A',t:'#fff'},{v:.25,l:'0.25',c:'#2E5E65',t:'#fff'},{v:.50,l:'0.50',c:'#2E5E65',t:'#fff'},{v:.75,l:'0.75',c:'#00A080',t:'#000'},{v:1.00,l:'1.00',c:'#00E2E2',t:'#000'},{v:1.50,l:'1.50',c:'#00D214',t:'#000'},{v:2.00,l:'2.00',c:'#1E8E24',t:'#fff'},{v:2.50,l:'2.50',c:'#E600E6',t:'#fff'},{v:3.00,l:'3.00',c:'#8F00B1',t:'#fff'},{v:3.50,l:'3.50',c:'#3800DE',t:'#fff'},{v:4.00,l:'4.00',c:'#0000FF',t:'#fff'},{v:4.50,l:'4.50',c:'#37127E',t:'#fff'},{v:5.00,l:'5.00',c:'#897C2B',t:'#fff'},{v:5.50,l:'5.50',c:'#D2D70F',t:'#000'},{v:6.00,l:'6.00',c:'#FFFF00',t:'#000'},{v:6.50,l:'6.50',c:'#FFD200',t:'#000'},{v:7.00,l:'7.00',c:'#FFB400',t:'#000'},{v:7.50,l:'7.50',c:'#FF9300',t:'#000'},{v:8.00,l:'8.00',c:'#FF7200',t:'#000'},{v:8.50,l:'8.50',c:'#FF4900',t:'#fff'},{v:9.00,l:'9.00',c:'#FF0000',t:'#fff'},{v:9.50,l:'9.50',c:'#B70000',t:'#fff'},{v:10.00,l:'10.00',c:'#800000',t:'#fff'},{v:11.00,l:'11.00',c:'#A53535',t:'#fff'},{v:12.00,l:'12.00',c:'#D65151',t:'#fff'},{v:12.50,l:'12.50',c:'#E27575',t:'#000'},{v:13.00,l:'13.00',c:'#E89A9A',t:'#000'},{v:14.00,l:'14.00',c:'#FAECCC',t:'#000'},{v:15.00,l:'15+',c:'#FFFFFF',t:'#000'}];
const LEGEND=[{v:0,l:'0.00',c:'#000000',t:'#fff'},...RAIN];
const CITIES=[['Baton Rouge',30.4515,-91.1871],['New Orleans',29.9511,-90.0715],['Gulfport',30.3674,-89.0928],['McComb',31.2438,-90.4532],['Woodville',31.1046,-91.2993],['Hammond',30.5044,-90.4612],['Bogalusa',30.7910,-89.8487],['Houma',29.5958,-90.7195],['Covington',30.4755,-90.1009],['Mandeville',30.3583,-90.0656],['Slidell',30.2752,-89.7812],['Picayune',30.5255,-89.6795],['Poplarville',30.8402,-89.5342],['Franklinton',30.8471,-90.1531],['Amite',30.7266,-90.5087],['Greensburg',30.8307,-90.6718],['Gonzales',30.2385,-90.9201],['Laplace',30.0666,-90.4801],['Thibodaux',29.7958,-90.8229],['Galliano',29.4422,-90.2992],['Bay St. Louis',30.3088,-89.3300],['Waveland',30.2869,-89.3762],['Diamondhead',30.3946,-89.3639],['Biloxi',30.3960,-88.8853],['Ocean Springs',30.4113,-88.8278],['Pascagoula',30.3658,-88.5561]];
let state={source:'KHDC',product:'DTA',opacity:.72,wx:null,county:null,states:null,lakes:null,cwa:null,cities:null,pinned:false,pin:null,last:0,seq:0};
function station(){return RADARS[state.source].station}function layer(){return `${station()}_${PRODUCTS[state.product].code}`}function wms(){return `https://opengeo.ncep.noaa.gov/geoserver/${station()}/ows`}function status(x){document.getElementById('status').innerHTML=x}
function legendLabel(r){if(r.v===15)return'15+';if(r.v>3&&Math.abs(r.v%1-.5)<.01)return'';return Number(r.v).toFixed(1)}
function colorBin(v){if(v==null||Number.isNaN(Number(v))||Number(v)<.10)return null;let b=RAIN[0];for(const r of RAIN){if(Number(v)>=r.v)b=r}return b}function fmt(v){const b=colorBin(v);if(!b)return{txt:'No data',bg:'transparent',fg:'#555'};return{txt:`${Number(v).toFixed(1)} in`,bg:b.c,fg:b.t}}
function read(ll,val,meta,bg='transparent',fg='#555'){const e=document.getElementById('readout-value');e.innerHTML=val;e.style.background=bg;e.style.color=fg;document.getElementById('readout-coords').textContent=`${ll.lat.toFixed(4)}°, ${ll.lng.toFixed(4)}°`;document.getElementById('readout-meta').textContent=meta}
function loadWx(){if(state.wx)map.removeLayer(state.wx);if(state.source==='MRMS'){state.wx=new ArcLayer({opacity:state.opacity,tileSize:256,pane:'weatherPane'}).addTo(map);status('<span class="good">Layer:</span> MRMS QPE')}else{state.wx=L.tileLayer.wms(wms(),{layers:layer(),format:'image/png',transparent:true,version:'1.1.1',opacity:state.opacity,pane:'weatherPane',crossOrigin:'anonymous'}).addTo(map);status(`<span class="good">Layer:</span> ${layer()}`)}front();legend();if(!state.pinned)read(map.getCenter(),'Move cursor','Cursor samples the active layer. Click map to pin.')}
const ArcLayer=L.GridLayer.extend({createTile:function(c,done){const t=document.createElement('img');t.crossOrigin='anonymous';t.onload=()=>done(null,t);t.onerror=()=>done(Error('MRMS tile failed'),t);t.style.width=t.style.height='256px';const nw=c.multiplyBy(256),se=nw.add([256,256]),nwp=map.unproject(nw,c.z),sep=map.unproject(se,c.z),sw=map.options.crs.project(L.latLng(sep.lat,nwp.lng)),ne=map.options.crs.project(L.latLng(nwp.lat,sep.lng));t.src=`${URLS.mrms}/export?f=image&bbox=${[sw.x,sw.y,ne.x,ne.y].join(',')}&bboxSR=3857&imageSR=3857&size=256,256&format=png32&transparent=true&layers=show:0&_=${Date.now()}`;return t}});
function legend(){const title=document.getElementById('legend-title'),body=document.getElementById('legend-body'),cols=`repeat(${LEGEND.length},1fr)`;title.textContent=state.source==='MRMS'?`MRMS QPE / ${PRODUCTS[state.product].label}`:`${state.source} ${PRODUCTS[state.product].label}`;body.innerHTML=`<div class="radar-legend-bar" style="grid-template-columns:${cols}">${LEGEND.map(r=>`<span class="radar-legend-swatch" title="${r.l} in" style="background:${r.c}"></span>`).join('')}</div><div class="radar-legend-labels" style="grid-template-columns:${cols}">${LEGEND.map(r=>`<span>${legendLabel(r)}</span>`).join('')}</div><div class="legend-note">Storm-total rainfall in inches. Unlabeled swatches remain active threshold colors.</div>`}
function cleanSample(v){const n=Number(v);if(!Number.isFinite(n))return null;if(n<0||n>40)return null;return n}
function extractPrecip(o){if(!o)return{value:null,reason:'No sample data returned'};const keys=['value','VALUE','pixel_value','PixelValue','Pixel Value','band_1','Band1','RASTERVALU','grid_value','Data Value','data_value','precip','PRECIP','qpe','QPE','rain','RAIN'];for(const k of keys){if(o[k]!=null){const n=cleanSample(o[k]);if(n!=null)return{value:n,reason:k}}}for(const [k,v] of Object.entries(o)){const name=k.toLowerCase();if((name.includes('value')||name.includes('precip')||name.includes('qpe')||name.includes('rain')||name.includes('raster')||name.includes('grid'))&&!name.includes('gray')){const n=cleanSample(v);if(n!=null)return{value:n,reason:k}}}if(o.GRAY_INDEX!=null||o.gray_index!=null)return{value:null,reason:'Service returned raw raster color index, not inches'};return{value:null,reason:'No valid rainfall value found'}}
function identify(ll,seq){if(state.source==='MRMS'){const s=map.getSize(),b=map.getBounds(),ext=[b.getWest(),b.getSouth(),b.getEast(),b.getNorth()].join(','),geom=`${ll.lng},${ll.lat}`,u=`${URLS.mrms}/identify?f=json&geometry=${encodeURIComponent(geom)}&geometryType=esriGeometryPoint&sr=4326&layers=all:0&tolerance=3&mapExtent=${encodeURIComponent(ext)}&imageDisplay=${s.x},${s.y},96&returnGeometry=false`;fetch(u).then(r=>r.json()).then(j=>{if(seq!==state.seq)return;let sample=extractPrecip(j?.results?.[0]?.attributes);if(sample.value==null)return read(ll,'Sample unavailable',sample.reason,'transparent','#555');let f=fmt(sample.value);read(ll,f.txt,`MRMS identify (${sample.reason})`,f.bg,f.fg)}).catch(e=>read(ll,'Unavailable',`MRMS identify failed: ${e.message}`));return}const p=map.latLngToContainerPoint(ll),s=map.getSize(),b=map.getBounds(),bbox=[b.getWest(),b.getSouth(),b.getEast(),b.getNorth()].join(','),u=`${wms()}?service=WMS&version=1.1.1&request=GetFeatureInfo&layers=${encodeURIComponent(layer())}&query_layers=${encodeURIComponent(layer())}&styles=&bbox=${encodeURIComponent(bbox)}&width=${s.x}&height=${s.y}&x=${Math.round(p.x)}&y=${Math.round(p.y)}&srs=EPSG:4326&info_format=application/json`;fetch(u).then(r=>r.json()).then(j=>{if(seq!==state.seq)return;let sample=extractPrecip(j?.features?.[0]?.properties);if(sample.value==null)return read(ll,'Sample unavailable',sample.reason,'transparent','#555');let f=fmt(sample.value);read(ll,f.txt,`${state.source} GetFeatureInfo (${sample.reason})`,f.bg,f.fg)}).catch(e=>read(ll,'Unavailable',`GetFeatureInfo failed: ${e.message}`))}
function touches(f){let ok=false;function scan(c){if(ok)return;if(typeof c[0]==='number'){let lon=c[0],lat=c[1];if(lon>=LOCAL.west&&lon<=LOCAL.east&&lat>=LOCAL.south&&lat<=LOCAL.north)ok=true;return}c.forEach(scan)}if(f.geometry?.coordinates)scan(f.geometry.coordinates);return ok}
function county(){fetch(URLS.county).then(r=>r.json()).then(g=>{state.county=L.geoJSON({type:'FeatureCollection',features:g.features.filter(touches)},{interactive:false,pane:'referencePane',style:{color:'#b7b7b7',weight:.55,opacity:.65,fillOpacity:0}}).addTo(map);front()})}
function cwa(){const where=encodeURIComponent("wfo='LIX'");fetch(`${URLS.nws}/1/query?where=${where}&outFields=wfo,cwa&returnGeometry=true&outSR=4326&f=geojson`).then(r=>r.json()).then(g=>{state.cwa=L.geoJSON(g,{interactive:false,pane:'referencePane',style:{color:'#000',weight:3,opacity:.95,fillOpacity:0}}).addTo(map);front()}).catch(e=>status(`<span class="bad">Official LIX CWA failed:</span> ${e.message}`))}
function states(){fetch(URLS.states).then(r=>r.json()).then(g=>{state.states=L.geoJSON({type:'FeatureCollection',features:g.features.filter(f=>['Louisiana','Mississippi','Alabama'].includes(f.properties?.name))},{interactive:false,pane:'referencePane',style:{color:'#555',weight:1.4,opacity:.9,fillOpacity:0}}).addTo(map);front()})}
function lakes(){fetch(URLS.lakes).then(r=>r.json()).then(g=>{state.lakes=L.geoJSON({type:'FeatureCollection',features:g.features.filter(touches)},{interactive:false,pane:'referencePane',style:{color:'#000',weight:1.2,opacity:.85,fillOpacity:0}}).addTo(map);front()})}
function cities(){state.cities=L.layerGroup(CITIES.map(c=>L.marker([c[1],c[2]],{pane:'cityPane',interactive:false,icon:L.divIcon({className:'city-label',html:`<div class="city-text"><span class="city-dot"></span>${c[0]}</div>`,iconSize:[220,24],iconAnchor:[0,12]})}))).addTo(map)}
function front(){['county','states','lakes','cwa','cities'].forEach(k=>state[k]?.bringToFront?.())}
const Panel=L.Control.extend({onAdd:function(){const d=L.DomUtil.create('div','panel');d.innerHTML=`<h1>Radar / MRMS QPE</h1><label>Source<select id="src"><option>KHDC</option><option>KMOB</option><option>MRMS</option></select></label><label>Product<select id="prod"><option value="DTA">Storm Total Precip</option><option value="DAA">1 Hour Precip</option></select></label><label>Opacity <span id="opv">72%</span><input id="op" type="range" min="15" max="100" value="72"></label><button id="refresh">Refresh layer</button><button id="clearpin">Clear pin</button><div class="section"><b>Sampling</b><div class="status" id="status">Loading...</div></div>`;L.DomEvent.disableClickPropagation(d);return d}});map.addControl(new Panel({position:'topleft'}));
const Read=L.Control.extend({onAdd:function(){const d=L.DomUtil.create('div','readout');d.innerHTML=`<b>Point rainfall</b><br><span class="value" id="readout-value">Move cursor</span><div class="coords" id="readout-coords"></div><div class="meta" id="readout-meta"></div>`;return d}});map.addControl(new Read({position:'topright'}));
const Leg=L.Control.extend({onAdd:function(){const d=L.DomUtil.create('div','legend');d.innerHTML=`<div class="legend-title" id="legend-title"></div><div id="legend-body"></div>`;return d}});map.addControl(new Leg({position:'bottomleft'}));
document.getElementById('src').onchange=e=>{state.source=e.target.value;loadWx()};document.getElementById('prod').onchange=e=>{state.product=e.target.value;loadWx()};document.getElementById('op').oninput=e=>{state.opacity=Number(e.target.value)/100;document.getElementById('opv').textContent=e.target.value+'%';if(state.wx?.setOpacity)state.wx.setOpacity(state.opacity);else if(state.wx){map.removeLayer(state.wx);loadWx()}};document.getElementById('refresh').onclick=()=>loadWx();document.getElementById('clearpin').onclick=()=>{state.pinned=false;if(state.pin){map.removeLayer(state.pin);state.pin=null}read(map.getCenter(),'Move cursor','Cursor samples the active layer. Click map to pin.')};
map.on('mousemove',e=>{if(state.pinned)return;const now=Date.now();if(now-state.last<250)return;state.last=now;identify(e.latlng,++state.seq)});map.on('click',e=>{state.pinned=true;if(state.pin)map.removeLayer(state.pin);state.pin=L.circleMarker(e.latlng,{radius:6,color:'#000',weight:2,fillColor:'#fff',fillOpacity:.9}).addTo(map);identify(e.latlng,++state.seq)});
county();states();lakes();cwa();cities();loadWx();
</script>
</body>
</html>
